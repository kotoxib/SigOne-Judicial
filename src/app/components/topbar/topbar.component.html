<header class="topbar">

  <!-- Left: hamburger + tabs -->
  <div class="topbar-left">
    <button
      (click)="$event.stopPropagation(); sidebarToggle.emit()"
      class="topbar-toggle-btn">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <nav class="topbar-tabs-nav">
      @for (tab of tabs; track tab.key) {
        <button
          class="topbar-tab"
          [class.active]="activeTab === tab.key"
          (click)="tabChange.emit(tab.key)">
          {{ tab.label }}
        </button>
      }
    </nav>
  </div>

  <!-- Right: greeting + logout -->
  <div class="topbar-right">

    <!-- Notification bell -->
    <button class="topbar-icon-btn" style="position:relative">
      <svg width="20" height="20" fill="none" stroke="var(--muted)" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      <span class="notif-dot"></span>
    </button>

    <!-- Cobertura badge + greeting -->
    @if (coberturaActiva) {
      <div class="topbar-cobertura-wrap">
        <span class="topbar-cobertura-badge">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Cobertura
        </span>
        <span class="topbar-greeting">
          Cubriendo a <strong>{{ coberturaActiva.usuarioCubiertoNombre }}</strong>
        </span>
        <span class="topbar-cobertura-sub">como {{ userName }} · hasta {{ coberturaActiva.fechaFin | date:'dd/MM' }}</span>
      </div>
    } @else {
      <span class="topbar-greeting">Hola, <strong>{{ userName }}</strong></span>
    }

    <!-- Logout button -->
    <button class="topbar-logout-btn" (click)="logoutEvent.emit()" title="Cerrar sesión">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span class="topbar-logout-label">Cerrar sesión</span>
    </button>

  </div>
</header>
